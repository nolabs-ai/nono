server {
    bind_address = "127.0.0.1"
    bind_port = "18081"
    socket_path = "/tmp/nono-test-spire/server.sock"
    trust_domain = "test.nono"
    data_dir = "/tmp/nono-test-spire/data/server"
    log_level = "WARN"

    ca_ttl = "1h"
    default_x509_svid_ttl = "1h"
    default_jwt_svid_ttl = "5m"
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "/tmp/nono-test-spire/data/server/datastore.sqlite3"
        }
    }

    KeyManager "memory" {
        plugin_data {}
    }

    NodeAttestor "join_token" {
        plugin_data {}
    }
}
