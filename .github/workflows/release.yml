name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v0.2.3)"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    if: github.repository == 'nolabs-ai/nono'
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (glibc) - use 22.04 for broader GLIBC compatibility
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: nono

          # macOS x86_64 (Intel)
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: nono

          # macOS aarch64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: nono

          # Linux aarch64 (ARM64)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: nono

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      # rpm is needed for building .rpm release artifacts; libdbus is no longer
      # required now that the Linux keyring backend is pure-Rust (zbus).
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config rpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross

      - name: Build
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }} -p nono-cli
        env:
          NONO_INSTALL_SOURCE: github_release

      - name: Build (cross aarch64-unknown-linux-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target aarch64-unknown-linux-gnu -p nono-cli
        env:
          NONO_INSTALL_SOURCE: github_release

      # The portable .tar.gz artifacts carry no dependency metadata, so a binary
      # that links libdbus would fail to start on hosts without it. The Linux
      # keyring backend is the pure-Rust zbus path; guard against a regression
      # back to the C Secret Service backend. objdump parses the ELF NEEDED
      # entries for both native and cross-built (aarch64) binaries.
      - name: Verify binary does not link libdbus (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/nono"
          needed="$(objdump -p "$bin" | awk '/NEEDED/ {print $2}')"
          echo "NEEDED libraries for $bin:"
          echo "$needed"
          if echo "$needed" | grep -qi '^libdbus'; then
            echo "::error::$bin links libdbus — the release binary is not portable"
            exit 1
          fi
          echo "OK: no libdbus dependency"

      # Signing + notarization must happen before Package so the .tar.gz,
      # SHA256SUMS, and build-provenance attestations all cover the signed
      # binary. The Developer ID certificate lives in a throwaway keychain
      # that is deleted in the always() cleanup step below.
      - name: Import signing certificate (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          rm "$RUNNER_TEMP/certificate.p12"

          # Allow codesign to use the key without a UI password prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Sign binary (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/nono"
          codesign --force --timestamp --options runtime \
            --identifier ai.nolabs.nono \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$BIN"
          codesign --verify --strict --verbose=2 "$BIN"
          codesign --display --verbose=2 "$BIN"

      # notarytool only accepts zip/dmg/pkg, so the binary is submitted in a
      # temporary zip. Stapling is skipped: tickets cannot be stapled to bare
      # Mach-O executables, so Gatekeeper looks the ticket up online instead.
      - name: Notarize binary (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/nono"
          ditto -c -k "$BIN" "$RUNNER_TEMP/nono-notarize.zip"

          SUBMISSION_JSON="$(xcrun notarytool submit "$RUNNER_TEMP/nono-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --output-format json)"
          echo "$SUBMISSION_JSON"

          STATUS="$(echo "$SUBMISSION_JSON" | jq -r '.status')"
          SUBMISSION_ID="$(echo "$SUBMISSION_JSON" | jq -r '.id')"
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed with status: $STATUS"
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID"
            exit 1
          fi

      - name: Clean up signing keychain (macOS)
        if: always() && runner.os == 'macOS'
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf ../../../nono-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}
          cd ../../..

      - name: Install cargo-deb
        if: runner.os == 'Linux' && (matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-unknown-linux-gnu')
        run: cargo install cargo-deb

      - name: Build .deb (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          VERSION="${{ env.RELEASE_TAG }}"
          VERSION="${VERSION#v}"
          cd crates/nono-cli
          cargo deb --deb-version "$VERSION"

      - name: Build .deb (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          VERSION="${{ env.RELEASE_TAG }}"
          VERSION="${VERSION#v}"
          cd crates/nono-cli
          cargo deb --target aarch64-unknown-linux-gnu --no-build --deb-version "$VERSION"

      - name: Build .rpm
        if: runner.os == 'Linux'
        run: |
          VERSION="${{ env.RELEASE_TAG }}"
          VERSION="${VERSION#v}"
          scripts/build-rpm.sh "$VERSION" "${{ matrix.target }}"

      - name: Prepare upload
        shell: bash
        run: |
          mkdir -p artifact_staging
          cp "nono-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz" artifact_staging/
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ] && [ -d target/debian ]; then
            cp target/debian/*.deb artifact_staging/
          fi
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ] && [ -d target/aarch64-unknown-linux-gnu/debian ]; then
            cp target/aarch64-unknown-linux-gnu/debian/*.deb artifact_staging/
          fi
          if [ -d "target/rpm/${{ matrix.target }}/RPMS" ]; then
            find "target/rpm/${{ matrix.target }}/RPMS" -name "*.rpm" -exec cp {} artifact_staging/ \;
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nono-${{ matrix.target }}
          path: artifact_staging

  attest:
    name: Attest Release Artifacts
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Attest build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            artifacts/**/*.tar.gz
            artifacts/**/*.deb
            artifacts/**/*.rpm

  release:
    name: Create Release
    needs: attest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name "*.tar.gz" -exec mv {} . \;
          find . -name "*.deb" -exec mv {} . \;
          find . -name "*.rpm" -exec mv {} . \;
          sha256sum -- *.tar.gz *.deb *.rpm > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/SHA256SUMS.txt

  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    # Only publish stable releases to crates.io
    if: ${{ !contains(github.event.inputs.tag || github.ref_name, 'alpha') && !contains(github.event.inputs.tag || github.ref_name, 'beta') && !contains(github.event.inputs.tag || github.ref_name, 'rc') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Publish nono (core library)
        run: |
          VERSION="${RELEASE_TAG#v}"
          if cargo search nono --limit 1 2>/dev/null | grep -q "\"$VERSION\""; then
            echo "nono $VERSION already published, skipping"
          else
            cargo publish -p nono --allow-dirty --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish nono-proxy
        run: |
          VERSION="${RELEASE_TAG#v}"
          echo "Waiting for nono $VERSION to appear on crates.io..."
          for i in $(seq 1 30); do
            if cargo search nono --limit 1 2>/dev/null | grep -q "\"$VERSION\""; then
              echo "Found nono $VERSION on crates.io"
              break
            fi
            echo "Attempt $i: not yet indexed, retrying in 10s..."
            sleep 10
          done
          if cargo search nono-proxy --limit 1 2>/dev/null | grep -q "\"$VERSION\""; then
            echo "nono-proxy $VERSION already published, skipping"
          else
            cargo publish -p nono-proxy --allow-dirty --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish nono-cli
        run: |
          VERSION="${RELEASE_TAG#v}"
          echo "Waiting for nono-proxy $VERSION to appear on crates.io..."
          for i in $(seq 1 30); do
            if cargo search nono-proxy --limit 1 2>/dev/null | grep -q "\"$VERSION\""; then
              echo "Found nono-proxy $VERSION on crates.io"
              break
            fi
            echo "Attempt $i: not yet indexed, retrying in 10s..."
            sleep 10
          done
          if cargo search nono-cli --limit 1 2>/dev/null | grep -q "\"$VERSION\""; then
            echo "nono-cli $VERSION already published, skipping"
          else
            cargo publish -p nono-cli --allow-dirty --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  notify-downstream:
    name: Notify Downstream Repos
    needs: [release, publish-crates]
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.inputs.tag || github.ref_name, 'alpha') && !contains(github.event.inputs.tag || github.ref_name, 'beta') && !contains(github.event.inputs.tag || github.ref_name, 'rc') }}
    strategy:
      fail-fast: false
      matrix:
        repo:
          - nolabs-ai/nono-py
          - nolabs-ai/nono-ts
          - nolabs-ai/nono-go
          - nolabs-ai/nono-docs
    steps:
      - name: Dispatch to ${{ matrix.repo }}
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.DOWNSTREAM_PAT }}
          repository: ${{ matrix.repo }}
          event-type: nono-release
          client-payload: '{"nono_version": "${{ env.RELEASE_TAG }}"}'
