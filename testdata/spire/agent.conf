agent {
    data_dir = "/tmp/nono-test-spire/data/agent"
    log_level = "WARN"
    trust_domain = "test.nono"
    server_address = "127.0.0.1"
    server_port = "18081"
    socket_path = "/tmp/nono-test-spire/agent.sock"

    # Bootstrap trust from the server's bundle endpoint rather than a
    # pre-distributed bundle — acceptable for ephemeral CI environments.
    insecure_bootstrap = true
}

plugins {
    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "memory" {
        plugin_data {}
    }

    WorkloadAttestor "unix" {
        plugin_data {}
    }
}
