name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.2.3)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
  WIX_VERSION: 7.0.0

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (glibc) - use 22.04 for broader GLIBC compatibility
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: nono

          # macOS x86_64 (Intel)
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: nono

          # macOS aarch64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: nono

          # Linux aarch64 (ARM64)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: nono

          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: nono.exe

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux' && matrix.target != 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross

      - name: Build
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }} -p nono-cli

      - name: Build broker (Windows)
        if: runner.os == 'Windows'
        run: cargo build --release --target ${{ matrix.target }} -p nono-shell-broker

      - name: Build (cross aarch64-unknown-linux-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target aarch64-unknown-linux-gnu -p nono-cli

      - name: Install WiX
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version $env:WIX_VERSION
          Add-Content -Path $env:GITHUB_PATH -Value "$env:USERPROFILE\.dotnet\tools"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf ../../../nono-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}
          cd ../../..

      - name: Install cargo-deb
        if: runner.os == 'Linux' && (matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-unknown-linux-gnu')
        run: cargo install cargo-deb

      - name: Build .deb (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          VERSION="${{ env.RELEASE_TAG }}"
          VERSION="${VERSION#v}"
          cd crates/nono-cli
          cargo deb --deb-version "$VERSION"

      - name: Build .deb (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          VERSION="${{ env.RELEASE_TAG }}"
          VERSION="${VERSION#v}"
          cd crates/nono-cli
          cargo deb --target aarch64-unknown-linux-gnu --no-build --deb-version "$VERSION"

      # D-10: signing runs only for tag/release builds, including workflow_dispatch
      # runs that target an actual tag. The RELEASE_TAG env var is always set to the
      # tag name (push) or the provided input tag (workflow_dispatch), so this step
      # correctly gates on those cases via the tag-triggered workflow definition above.
      - name: Check signing secrets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERT)) {
            Write-Error "WINDOWS_SIGNING_CERT and WINDOWS_SIGNING_CERT_PASSWORD must be set. Set these repository secrets before releasing Windows artifacts. See docs/cli/development/windows-signing-guide.mdx."
            exit 1
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERT_PASSWORD)) {
            Write-Error "WINDOWS_SIGNING_CERT and WINDOWS_SIGNING_CERT_PASSWORD must be set. Set these repository secrets before releasing Windows artifacts. See docs/cli/development/windows-signing-guide.mdx."
            exit 1
          }
          Write-Host "Signing secrets present — proceeding to sign."
        env:
          WINDOWS_SIGNING_CERT: ${{ secrets.WINDOWS_SIGNING_CERT }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}

      # D-11: build both machine and user MSIs before signing
      # Phase 31 Plan 04: include nono-shell-broker.exe as a sibling component in
      # both MSIs so install-time deployment lands the broker next to nono.exe at
      # the install dir current_exe().parent() resolves to at runtime (D-07).
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binary = Join-Path $PWD "target\\${{ matrix.target }}\\release\\${{ matrix.artifact }}"
          $broker = Join-Path $PWD "target\\${{ matrix.target }}\\release\\nono-shell-broker.exe"
          # Quick task 260522-c9c: machine-scope MSI must bundle BOTH the WFP
          # backend service and the pre-signed kernel driver. The driver source
          # is the checked-in pre-signed copy under crates/nono-cli/data/windows/
          # (NOT the dev build artifact under target/) so released MSIs always
          # ship the WHQL-signed driver. User-scope invocation below MUST NOT
          # pass either flag — build-windows-msi.ps1 throws fail-closed on that
          # combination.
          $service = Join-Path $PWD "target\\${{ matrix.target }}\\release\\nono-wfp-service.exe"
          $driver  = Join-Path $PWD "crates\\nono-cli\\data\\windows\\nono-wfp-driver.sys"
          if (-not (Test-Path $binary)) {
            Write-Error "Missing release binary: $binary"
            exit 1
          }
          if (-not (Test-Path $broker)) {
            Write-Error "Missing broker binary: $broker"
            exit 1
          }
          if (-not (Test-Path $service)) {
            Write-Error "Missing WFP service binary: $service"
            exit 1
          }
          if (-not (Test-Path $driver)) {
            Write-Error "Missing WFP driver binary (checked-in pre-signed copy): $driver"
            exit 1
          }
          .\scripts\build-windows-msi.ps1 `
            -VersionTag "${{ env.RELEASE_TAG }}" `
            -BinaryPath $binary `
            -BrokerPath $broker `
            -ServiceBinaryPath $service `
            -DriverBinaryPath $driver `
            -Scope machine `
            -OutputDir artifact_staging
          .\scripts\build-windows-msi.ps1 `
            -VersionTag "${{ env.RELEASE_TAG }}" `
            -BinaryPath $binary `
            -BrokerPath $broker `
            -Scope user `
            -OutputDir artifact_staging

      # D-13: fail closed if signing or verification fails; never upload unsigned artifacts.
      # Signs the raw .exe, the broker .exe (Phase 31 Plan 04), and both MSIs before
      # any upload step. The broker is signed with the SAME Authenticode key as nono.exe
      # so the Phase 28 chain-walker (parse_signer_subject) records a consistent signer
      # for any audit-ledger trace involving the broker process.
      - name: Sign Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binary = Join-Path $PWD "target\\${{ matrix.target }}\\release\\${{ matrix.artifact }}"
          $broker = Join-Path $PWD "target\\${{ matrix.target }}\\release\\nono-shell-broker.exe"
          $machineMsi = Join-Path $PWD "artifact_staging\\nono-${{ env.RELEASE_TAG }}-x86_64-pc-windows-msvc-machine.msi"
          $userMsi = Join-Path $PWD "artifact_staging\\nono-${{ env.RELEASE_TAG }}-x86_64-pc-windows-msvc-user.msi"
          .\scripts\sign-windows-artifacts.ps1 `
            -CertBase64 $env:WINDOWS_SIGNING_CERT `
            -CertPassword $env:WINDOWS_SIGNING_CERT_PASSWORD `
            -ArtifactPaths @($binary, $broker, $machineMsi, $userMsi)
        env:
          WINDOWS_SIGNING_CERT: ${{ secrets.WINDOWS_SIGNING_CERT }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}

      # Secondary Authenticode verification via PowerShell after signtool verify.
      # Both checks must pass before artifact upload (D-13).
      # Phase 31 Plan 04: extends the verify loop to include the broker.exe so any
      # signing failure on the broker fails the release before upload.
      - name: Verify Authenticode signatures (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binary = Join-Path $PWD "target\\${{ matrix.target }}\\release\\${{ matrix.artifact }}"
          $broker = Join-Path $PWD "target\\${{ matrix.target }}\\release\\nono-shell-broker.exe"
          $machineMsi = Join-Path $PWD "artifact_staging\\nono-${{ env.RELEASE_TAG }}-x86_64-pc-windows-msvc-machine.msi"
          $userMsi = Join-Path $PWD "artifact_staging\\nono-${{ env.RELEASE_TAG }}-x86_64-pc-windows-msvc-user.msi"
          foreach ($artifact in @($binary, $broker, $machineMsi, $userMsi)) {
            $sig = Get-AuthenticodeSignature -FilePath $artifact
            if ($sig.Status -ne "Valid") {
              Write-Error "Authenticode verification failed for $artifact with status $($sig.Status)."
              exit 1
            }
            Write-Host "Authenticode OK: $artifact"
          }

      # Phase 31 Plan 04: zip bundle now contains BOTH nono.exe and nono-shell-broker.exe
      # so users who download the zip get the broker as a sibling of nono.exe per D-07.
      - name: Create zip from signed binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binary = Join-Path $PWD "target\\${{ matrix.target }}\\release\\${{ matrix.artifact }}"
          $broker = Join-Path $PWD "target\\${{ matrix.target }}\\release\\nono-shell-broker.exe"
          $zipName = "nono-${{ env.RELEASE_TAG }}-${{ matrix.target }}.zip"
          $zipPath = Join-Path $PWD $zipName
          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }
          Compress-Archive -LiteralPath @($binary, $broker) -DestinationPath $zipPath

      - name: Verify signed binaries inside zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $zipName = "nono-${{ env.RELEASE_TAG }}-${{ matrix.target }}.zip"
          $extractRoot = Join-Path $PWD "zip-signature-check"
          if (Test-Path $extractRoot) {
            Remove-Item -LiteralPath $extractRoot -Recurse -Force
          }
          Expand-Archive -LiteralPath $zipName -DestinationPath $extractRoot -Force
          foreach ($name in @("${{ matrix.artifact }}", "nono-shell-broker.exe")) {
            $extractedBinary = Join-Path $extractRoot $name
            $sig = Get-AuthenticodeSignature -FilePath $extractedBinary
            if ($sig.Status -ne "Valid") {
              Write-Error "Zip payload signature verification failed for $extractedBinary with status $($sig.Status)."
              exit 1
            }
            Write-Host "Zip payload Authenticode OK: $extractedBinary"
          }

      # Artifact upload is downstream of all signing and verification steps (D-13).
      # Phase 31 Plan 04: stages the broker .exe alongside nono.exe so the broker
      # ships as a standalone signed artifact in addition to being inside the zip
      # and both MSIs.
      - name: Prepare upload (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binary = Join-Path $PWD "target\\${{ matrix.target }}\\release\\${{ matrix.artifact }}"
          $broker = Join-Path $PWD "target\\${{ matrix.target }}\\release\\nono-shell-broker.exe"
          $zipName = "nono-${{ env.RELEASE_TAG }}-${{ matrix.target }}.zip"
          foreach ($f in @($binary, $broker, $zipName)) {
            if (-not (Test-Path $f)) {
              Write-Error "Missing artifact: $f"
              exit 1
            }
          }
          Copy-Item $binary artifact_staging\
          Copy-Item $broker artifact_staging\
          Copy-Item $zipName artifact_staging\

      - name: Prepare upload
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p artifact_staging
          if [ -f "nono-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz" ]; then
            cp "nono-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz" artifact_staging/
          fi
          if [ -f "nono-${{ env.RELEASE_TAG }}-${{ matrix.target }}.zip" ]; then
            cp "nono-${{ env.RELEASE_TAG }}-${{ matrix.target }}.zip" artifact_staging/
          fi
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ] && [ -d target/debian ]; then
            cp target/debian/*.deb artifact_staging/
          fi
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ] && [ -d target/aarch64-unknown-linux-gnu/debian ]; then
            cp target/aarch64-unknown-linux-gnu/debian/*.deb artifact_staging/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: nono-${{ matrix.target }}
          path: artifact_staging

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd artifacts
          find . -name "*.tar.gz" -exec mv {} . \;
          find . -name "*.zip" -exec mv {} . \;
          find . -name "*.msi" -exec mv {} . \;
          find . -name "*.exe" -exec mv {} . \;
          find . -name "*.deb" -exec mv {} . \;

          # Phase 49 REQ-POC-TRUST-02: ship trusted_root.json as a release asset
          # alongside the binaries. Byte-identity assert closes the maintainer-side
          # provenance chain (D-49-B1) - what the maintainer commits to the frozen
          # fixture is what CI uploads.
          SRC=../crates/nono/tests/fixtures/trust-root-frozen.json
          DST=trusted_root.json
          cp "$SRC" "$DST"
          SRC_SHA=$(sha256sum "$SRC" | cut -d' ' -f1)
          DST_SHA=$(sha256sum "$DST" | cut -d' ' -f1)
          if [ "$SRC_SHA" != "$DST_SHA" ]; then
            echo "ERROR: trusted_root.json byte-identity assert failed" >&2
            echo "  src ($SRC): $SRC_SHA" >&2
            echo "  dst ($DST): $DST_SHA" >&2
            exit 1
          fi
          echo "trusted_root.json byte-identity verified: $SRC_SHA"

          sha256sum *.tar.gz > SHA256SUMS.txt
          if ls *.zip >/dev/null 2>&1; then
            sha256sum *.zip >> SHA256SUMS.txt
          fi
          if ls *.msi >/dev/null 2>&1; then
            sha256sum *.msi >> SHA256SUMS.txt
          fi
          if ls *.exe >/dev/null 2>&1; then
            sha256sum *.exe >> SHA256SUMS.txt
          fi
          if ls trusted_root.json >/dev/null 2>&1; then
            sha256sum trusted_root.json >> SHA256SUMS.txt
          fi
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.msi
            artifacts/*.exe
            artifacts/*.deb
            artifacts/trusted_root.json
            artifacts/SHA256SUMS.txt

  docker:
    name: Publish Docker Image
    needs: release
    if: ${{ !contains(github.event.inputs.tag || github.ref_name, 'alpha') && !contains(github.event.inputs.tag || github.ref_name, 'beta') && !contains(github.event.inputs.tag || github.ref_name, 'rc') }}
    uses: ./.github/workflows/image-build.yml
    with:
      ref: ${{ github.event.inputs.tag || github.ref_name }}
      version: ${{ github.event.inputs.tag || github.ref_name }}
      push: true
    secrets: inherit

  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    # Only publish stable releases to crates.io
    if: ${{ !contains(github.event.inputs.tag || github.ref_name, 'alpha') && !contains(github.event.inputs.tag || github.ref_name, 'beta') && !contains(github.event.inputs.tag || github.ref_name, 'rc') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Publish nono (core library)
        run: cargo publish -p nono --allow-dirty --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish nono-proxy
        run: |
          # Wait for crates.io to index the core library
          sleep 30
          cargo publish -p nono-proxy --allow-dirty --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish nono-cli
        run: |
          # Wait for crates.io to index nono-proxy
          sleep 30
          cargo publish -p nono-cli --allow-dirty --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  update-homebrew-core:
    name: Bump Homebrew Core Formula
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.inputs.tag || github.ref_name, 'alpha') && !contains(github.event.inputs.tag || github.ref_name, 'beta') && !contains(github.event.inputs.tag || github.ref_name, 'rc') }}
    steps:
      - name: Bump homebrew-core formula
        uses: mislav/bump-homebrew-formula-action@ccf2332299a883f6af50a1d2d41e5df7904dd769 # v4.1
        with:
          formula-name: nono
          tag-name: ${{ env.RELEASE_TAG }}
          download-url: "https://github.com/always-further/nono/archive/refs/tags/${{ env.RELEASE_TAG }}.tar.gz"
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_CORE_TOKEN }}
